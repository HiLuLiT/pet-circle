name: CI

on:
  push:
    branches:
      - 'feat/**'
      - 'feature/**'
      - 'bugfix/**'
      - 'fix/**'
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-check:
    name: Skip Duplicate
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@v5
        with:
          skip_after_successful_duplicate: 'true'

  analyze-and-test:
    name: Analyze & Test
    needs: pre-check
    if: needs.pre-check.outputs.should_skip != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PUB_CACHE }}
            .dart_tool/
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Restore firebase_options.dart
        env:
          FIREBASE_OPTIONS_B64: ${{ secrets.FIREBASE_OPTIONS_DART }}
        run: |
          if [ -n "$FIREBASE_OPTIONS_B64" ]; then
            echo "$FIREBASE_OPTIONS_B64" | base64 --decode > lib/firebase_options.dart
          else
            cat > lib/firebase_options.dart << 'DART'
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;

          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform => const FirebaseOptions(
              apiKey: 'stub',
              appId: 'stub',
              messagingSenderId: 'stub',
              projectId: 'stub',
            );
          }
          DART
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        # TODO: remove --no-fatal-warnings once pre-existing warnings are fixed
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Test with coverage
        run: flutter test --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          retention-days: 30
